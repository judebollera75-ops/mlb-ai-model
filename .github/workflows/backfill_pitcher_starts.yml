name: Backfill Historical Pitcher Starts

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set target date
        run: |
          echo "MLB_TARGET_DATE=$(TZ=America/Chicago date +%F)" >> "$GITHUB_ENV"

      - name: Backfill historical pitcher starts
        run: |
          python sports/mlb/data/download/download_historical_pitcher_starts.py

      - name: Verify historical archive
        run: |
          if [ ! -f data/historical/pitcher_starts.csv ]; then
            echo "Historical pitcher-start archive was not created."
            exit 1
          fi

          echo "Archive created successfully."
          wc -l data/historical/pitcher_starts.csv
          ls -lh data/historical/pitcher_starts.csv

      - name: Commit historical archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/historical/pitcher_starts.csv

          if git diff --cached --quiet; then
            echo "No historical pitcher-start changes to commit."
          else
            git commit -m "Backfill historical pitcher starts"
            git push origin HEAD:main
          fi
