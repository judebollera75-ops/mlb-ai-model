name: Daily MLB Model

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "Optional MLB slate date in YYYY-MM-DD format"
        required: false
        type: string

  schedule:
    - cron: "15 13 * * *"
    - cron: "15 18 * * *"

permissions:
  contents: write

concurrency:
  group: daily-mlb-model
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Determine MLB slate date
        shell: bash
        run: |
          MANUAL_DATE="${{ github.event.inputs.target_date }}"

          if [ -n "$MANUAL_DATE" ]; then
            TARGET_DATE="$MANUAL_DATE"
          else
            TARGET_DATE="$(TZ=America/Chicago date +%F)"
          fi

          if ! [[ "$TARGET_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "Invalid target date: $TARGET_DATE"
            echo "Expected YYYY-MM-DD."
            exit 1
          fi

          echo "MLB_TARGET_DATE=$TARGET_DATE" >> "$GITHUB_ENV"
          echo "Using MLB slate date: $TARGET_DATE"

            - name: Validate Python files
        run: |
          python -m compileall daily_run.py run_mlb_daily.py sports shared src

      - name: Download live sportsbook props
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          PARLAY_API_KEY: ${{ secrets.PARLAY_API_KEY }}
          MLB_TARGET_DATE: ${{ env.MLB_TARGET_DATE }}
        run: |
          if [ -z "$PARLAY_API_KEY" ]; then
            echo "PARLAY_API_KEY is not configured."
            exit 1
          fi

          python sports/mlb/data/download/download_sportsbook_props.py

      - name: Retrain leakage-free strikeout model
        run: |
          python sports/mlb/models/models/train_leakage_free_strikeouts.py

      - name: Run production MLB pipeline
        env:
          MLB_TARGET_DATE: ${{ env.MLB_TARGET_DATE }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          PARLAY_API_KEY: ${{ secrets.PARLAY_API_KEY }}
        run: |
          python run_mlb_daily.py

      - name: Verify required output
        run: |
          if [ ! -f outputs/mlb_daily_card.csv ]; then
            echo "Required output was not created:"
            echo "outputs/mlb_daily_card.csv"
            exit 1
          fi

          echo "Daily card created successfully."
          ls -lh outputs/mlb_daily_card.csv

      - name: Upload run outputs
        uses: actions/upload-artifact@v4
        with:
          name: mlb-output-${{ env.MLB_TARGET_DATE }}
          path: |
            outputs/
          if-no-files-found: error
          retention-days: 14

      - name: Commit updated files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data models outputs

          if git diff --cached --quiet; then
            echo "No generated data, model, or output changes to commit."
          else
            git commit -m "Automatic MLB update for ${MLB_TARGET_DATE}"

            git reset --hard HEAD
            git clean -fd

            git fetch origin main
            git rebase origin/main
            git push origin HEAD:main
          fi
