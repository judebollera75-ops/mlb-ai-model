name: Daily MLB Model

on:
  workflow_dispatch:
  schedule:
    - cron: "15 13 * * *"
    - cron: "15 18 * * *"

permissions:
  contents: write

# Prevent two MLB workflows from running and committing at the same time.
concurrency:
  group: daily-mlb-model
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download live sportsbook props
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          python sports/mlb/data/download/download_sportsbook_props.py

      - name: Run model
        run: |
          python run_mlb_daily.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Automatic daily update"
            git push origin HEAD:main
          fi
