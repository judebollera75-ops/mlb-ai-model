name: Grade MLB Results

on:
  workflow_dispatch:
    inputs:
      grade_date:
        description: "Optional date to grade in YYYY-MM-DD format"
        required: false
        type: string

  schedule:
    # 11:30 UTC is about 6:30 AM Central during daylight saving time.
    - cron: "30 11 * * *"

permissions:
  contents: write

concurrency:
  group: grade-mlb-results
  cancel-in-progress: false

jobs:
  grade:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Grade completed MLB recommendations
        env:
          MLB_GRADE_DATE: ${{ github.event.inputs.grade_date }}
          MLB_RUN_BACKTEST_AFTER_GRADING: "1"
        run: |
          python sports/mlb/betting/grade_daily_results.py

      - name: Build Backtesting Dashboard
        run: |
          python sports/mlb/analytics/build_backtesting_dashboard.py

      - name: Commit graded results
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add outputs/history/
          git add outputs/backtesting/
          git add outputs/analytics/

          if git diff --cached --quiet; then
            echo "No grading changes to commit."
          else
            git commit -m "Grade completed MLB recommendations"

            git fetch origin main
            git rebase origin/main
            git push origin HEAD:main
          fi
