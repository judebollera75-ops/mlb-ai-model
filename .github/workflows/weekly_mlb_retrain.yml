name: Weekly MLB Retraining

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: write

concurrency:
  group: weekly-mlb-retraining
  cancel-in-progress: false

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build hitter training dataset
        run: |
          python sports/mlb/features/features/build_hitter_training_dataset.py

      - name: Train hitter models
        run: |
          python sports/mlb/models/models/train_hitter_models.py

      - name: Commit updated models
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add models/
          git add outputs/hitters/

          if git diff --cached --quiet; then
            echo "No model changes."
          else
            git commit -m "Automatic weekly hitter retraining"
            git push origin HEAD:main
          fi
