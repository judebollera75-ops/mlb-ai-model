name: Weekly MLB Retraining

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "Optional training cutoff/slate date in YYYY-MM-DD format"
        required: false
        type: string

  schedule:
    # Sundays at 11:30 UTC.
    # Approximately 6:30 AM Central during daylight saving time.
    - cron: "30 11 * * 0"

permissions:
  contents: write

# Uses the same group as the daily workflow so both jobs cannot
# modify and push repository files simultaneously.
concurrency:
  group: daily-mlb-model
  cancel-in-progress: false

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Determine target date
        shell: bash
        run: |
          MANUAL_DATE="${{ github.event.inputs.target_date }}"

          if [ -n "$MANUAL_DATE" ]; then
            TARGET_DATE="$MANUAL_DATE"
          else
            TARGET_DATE="$(TZ=America/Chicago date +%F)"
          fi

          if ! [[ "$TARGET_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "Invalid target date: $TARGET_DATE"
            echo "Expected YYYY-MM-DD."
            exit 1
          fi

          echo "MLB_TARGET_DATE=$TARGET_DATE" >> "$GITHUB_ENV"
          echo "Training target date: $TARGET_DATE"

      - name: Validate Python files
        run: |
          python -m compileall \
            daily_run.py \
            run_mlb_daily.py \
            sports \
            shared \
            src

      - name: Back up current production models
        shell: bash
        run: |
          mkdir -p /tmp/mlb-model-backup
          mkdir -p /tmp/mlb-output-backup

          if [ -d models/hitters ]; then
            cp -R models/hitters /tmp/mlb-model-backup/
          fi

          if [ -f outputs/hitters/model_summary.csv ]; then
            cp outputs/hitters/model_summary.csv \
              /tmp/mlb-output-backup/old_model_summary.csv
          fi

          echo "Current production artifacts backed up."

      - name: Build hitter training dataset
        env:
          MLB_TARGET_DATE: ${{ env.MLB_TARGET_DATE }}
        run: |
          python \
            sports/mlb/features/features/build_hitter_training_dataset.py

      - name: Verify training dataset
        run: |
          python - <<'PY'
          from pathlib import Path
          import pandas as pd

          dataset_path = Path(
              "data/training/hitter_training_dataset.csv"
          )
          manifest_path = Path(
              "data/training/hitter_feature_manifest.csv"
          )

          if not dataset_path.exists():
              raise SystemExit(
                  f"Missing training dataset: {dataset_path}"
              )

          if not manifest_path.exists():
              raise SystemExit(
                  f"Missing feature manifest: {manifest_path}"
              )

          dataset = pd.read_csv(dataset_path)
          manifest = pd.read_csv(manifest_path)

          if len(dataset) < 1000:
              raise SystemExit(
                  f"Training dataset is unexpectedly small: "
                  f"{len(dataset)} rows"
              )

          if len(manifest) < 10:
              raise SystemExit(
                  f"Feature manifest is unexpectedly small: "
                  f"{len(manifest)} features"
              )

          required_targets = {
              "target_hits",
              "target_total_bases",
              "target_runs",
              "target_rbi",
              "target_hits_runs_rbis",
              "target_fantasy_score",
          }

          missing_targets = (
              required_targets - set(dataset.columns)
          )

          if missing_targets:
              raise SystemExit(
                  "Training dataset is missing targets: "
                  f"{sorted(missing_targets)}"
              )

          print(
              f"Training rows: {len(dataset):,}"
          )
          print(
              f"Manifest features: {len(manifest):,}"
          )
          PY

      - name: Train all hitter models
        env:
          MLB_TARGET_DATE: ${{ env.MLB_TARGET_DATE }}
        run: |
          python \
            sports/mlb/models/models/train_hitter_models.py

      - name: Verify production model artifacts
        run: |
          python - <<'PY'
          from pathlib import Path
          import joblib
          import pandas as pd

          markets = [
              "hits",
              "total_bases",
              "runs",
              "rbi",
              "hits_runs_rbis",
              "fantasy_score",
          ]

          model_directory = Path("models/hitters")
          summary_path = Path(
              "outputs/hitters/model_summary.csv"
          )

          if not summary_path.exists():
              raise SystemExit(
                  f"Missing model summary: {summary_path}"
              )

          summary = pd.read_csv(summary_path)

          trained_markets = set(
              summary["market"].astype(str)
          )

          missing_summary_markets = (
              set(markets) - trained_markets
          )

          if missing_summary_markets:
              raise SystemExit(
                  "Model summary is missing markets: "
                  f"{sorted(missing_summary_markets)}"
              )

          for market in markets:
              model_path = (
                  model_directory
                  / f"{market}_model.pkl"
              )

              if not model_path.exists():
                  raise SystemExit(
                      f"Missing trained model: {model_path}"
                  )

              bundle = joblib.load(model_path)

              required_keys = {
                  "model",
                  "model_name",
                  "features",
                  "medians",
                  "market",
                  "validation_mae",
                  "holdout_residuals",
              }

              missing_keys = (
                  required_keys - set(bundle)
              )

              if missing_keys:
                  raise SystemExit(
                      f"{model_path} is missing keys: "
                      f"{sorted(missing_keys)}"
                  )

              if bundle["market"] != market:
                  raise SystemExit(
                      f"Market mismatch in {model_path}"
                  )

              if len(bundle["features"]) < 10:
                  raise SystemExit(
                      f"Too few model features for {market}"
                  )

              if len(bundle["holdout_residuals"]) < 100:
                  raise SystemExit(
                      f"Too few holdout residuals for {market}"
                  )

          print("All six hitter model bundles passed validation.")
          PY

      - name: Compare new models with previous production models
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import pandas as pd

          old_path = Path(
              "/tmp/mlb-output-backup/old_model_summary.csv"
          )
          new_path = Path(
              "outputs/hitters/model_summary.csv"
          )

          if not old_path.exists():
              print(
                  "No previous model summary exists. "
                  "Skipping promotion comparison."
              )
              raise SystemExit(0)

          old = pd.read_csv(old_path)
          new = pd.read_csv(new_path)

          required_columns = {"market", "mae"}

          if not required_columns.issubset(old.columns):
              print(
                  "Previous summary uses an older schema. "
                  "Skipping comparison."
              )
              raise SystemExit(0)

          if not required_columns.issubset(new.columns):
              raise SystemExit(
                  "New summary is missing market or MAE."
              )

          comparison = old[
              ["market", "mae"]
          ].merge(
              new[["market", "mae"]],
              on="market",
              suffixes=("_old", "_new"),
              how="inner",
          )

          if comparison.empty:
              print(
                  "No comparable markets in the old summary. "
                  "Skipping comparison."
              )
              raise SystemExit(0)

          comparison["relative_change"] = (
              comparison["mae_new"]
              - comparison["mae_old"]
          ) / comparison["mae_old"].replace(0, pd.NA)

          old_average = comparison["mae_old"].mean()
          new_average = comparison["mae_new"].mean()

          print(comparison.to_string(index=False))
          print(f"Old average MAE: {old_average:.4f}")
          print(f"New average MAE: {new_average:.4f}")

          average_worsening = (
              new_average - old_average
          ) / old_average

          materially_worse_markets = comparison.loc[
              comparison["relative_change"] > 0.10
          ]

          if average_worsening > 0.05:
              raise SystemExit(
                  "New models rejected: average MAE worsened "
                  f"by {average_worsening:.2%}."
              )

          if len(materially_worse_markets) >= 2:
              raise SystemExit(
                  "New models rejected: at least two markets "
                  "worsened by more than 10%."
              )

          print("New models passed promotion safeguards.")
          PY

      - name: Restore previous models after failed promotion
        if: failure()
        shell: bash
        run: |
          if [ -d /tmp/mlb-model-backup/hitters ]; then
            rm -rf models/hitters
            cp -R /tmp/mlb-model-backup/hitters models/
            echo "Previous hitter models restored."
          fi

          if [ -f /tmp/mlb-output-backup/old_model_summary.csv ]; then
            cp /tmp/mlb-output-backup/old_model_summary.csv \
              outputs/hitters/model_summary.csv
            echo "Previous model summary restored."
          fi

      - name: Grade unresolved historical bets
        if: success()
        env:
          MLB_RUN_BACKTEST_AFTER_GRADING: "0"
        run: |
          if [ -f outputs/history/mlb_bet_results.csv ]; then
            python \
              sports/mlb/backtesting/grade_daily_results.py
          else
            echo "No historical bet-results file exists yet."
          fi

      - name: Run historical backtest
        if: success()
        shell: bash
        run: |
          if [ ! -f outputs/history/mlb_bet_results.csv ]; then
            echo "No historical results available. Skipping backtest."
            exit 0
          fi

          SETTLED_COUNT="$(
            python - <<'PY'
          import pandas as pd
          from pathlib import Path

          path = Path(
              "outputs/history/mlb_bet_results.csv"
          )

          data = pd.read_csv(path)

          if "actual_result" not in data.columns:
              print(0)
          else:
              print(
                  pd.to_numeric(
                      data["actual_result"],
                      errors="coerce",
                  ).notna().sum()
              )
          PY
          )"

          echo "Settled historical rows: $SETTLED_COUNT"

          if [ "$SETTLED_COUNT" -gt 0 ]; then
            python \
              sports/mlb/backtesting/backtest_daily_card.py
          else
            echo "No settled recommendations yet. Skipping backtest."
          fi

      - name: Upload retraining artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlb-weekly-retrain-${{ env.MLB_TARGET_DATE }}
          path: |
            models/hitters/
            outputs/hitters/
            outputs/backtesting/
            outputs/history/
            data/training/hitter_feature_manifest.csv
          if-no-files-found: warn
          retention-days: 30

      - name: Commit approved models and reports
        if: success()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            models/hitters \
            outputs/hitters \
            outputs/backtesting \
            outputs/history \
            data/training/hitter_feature_manifest.csv

          if git diff --cached --quiet; then
            echo "No approved retraining changes to commit."
          else
            git commit -m \
              "Automatic weekly MLB retraining for ${MLB_TARGET_DATE}"

            git pull --rebase origin main
            git push origin HEAD:main
          fi
